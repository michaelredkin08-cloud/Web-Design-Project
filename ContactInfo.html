<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="description" content="Contact and Join page for Clash Royale University Club">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contact / Join</title>

    <link rel="stylesheet" href="Styles/style.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Oxanium:wght@500;700&family=Poppins:wght@400;500;600&display=swap" rel="stylesheet">
</head>
<body>

<header class="topbar">
    <img class="logo" src="Images/royal_club_logo.jpg" alt="Club logo">

    <h1>Join Us</h1>

    <nav>
        <ul>
            <li><a href="index.html">Home</a></li>
            <li><a href="Memberships.html">Memberships</a></li>
            <li><a href="Events.html">Events</a></li>
            <li><a href="ContactInfo.html">Contact/Join</a></li>
            <li><a href="AboutUs.html">About</a></li>
        </ul>
    </nav>
</header>

<main class="form-page">
    <h2>Contact and Join</h2>

    <p>
        Fill in the form below to join the Clash Royale University Club.
    </p>

    <form class="join-form">
        <label for="fullname">Full Name</label>
        <input type="text" id="fullname" name="fullname" placeholder="Enter your full name">

        <label for="email">Email Address</label>
        <input type="email" id="email" name="email" placeholder="Enter your email">

        <label for="course">Course / Programme</label>
        <input type="text" id="course" name="course" placeholder="Enter your course">

        <label for="experience">Game Experience</label>
        <select id="experience" name="experience">
            <option>Beginner</option>
            <option>Intermediate</option>
            <option>Advanced</option>
        </select>

        <label for="favouritecard">Favourite Card</label>
        <input type="text" id="favouritecard" name="favouritecard" placeholder="Example: Mega Knight">

        <label for="message">Why do you want to join?</label>
        <textarea id="message" name="message" rows="5" placeholder="Write here..."></textarea>

        <input type="submit" value="Submit">
    </form>
</main>

<footer>
    <p>&copy; 2026 Clash Royale University club</p>
</footer>

</body>
</html>
